<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium House Price Predictor</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    
    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>

  <body>
    <!-- Background Animation -->
    <div class="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
    </div>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          
          <div class="glass-container">
            <div class="text-center mb-5">
              <h1>House Price Predictor</h1>
              <p class="subtitle">Enter your property details below to get an AI-powered price estimate</p>
            </div>

            {% if predicted_price %}
            <div class="prediction-card">
              <div class="prediction-label">Estimated Value</div>
              <h2>${{ '{:,.2f}'.format(predicted_price) }}</h2>
              <a href="/" class="btn btn-outline-light mt-3 rounded-pill px-4">Evaluate Another Property</a>
            </div>
            {% endif %}

            <form action="/" method="POST" autocomplete="off" id="prediction-form">
              
              <!-- Property Details Section -->
              <h3 class="section-title"><i class="bi bi-house-door"></i> Property Details</h3>
              <div class="row g-4 mb-4">
                <div class="col-md-3 form-group-wrapper" style="animation-delay: 0.1s">
                  <label for="bedrooms" class="form-label">Bedrooms</label>
                  <input type="number" step="0.5" class="form-control" id="bedrooms" name="bedrooms" placeholder="e.g. 3" required />
                </div>
                <div class="col-md-3 form-group-wrapper" style="animation-delay: 0.2s">
                  <label for="bathrooms" class="form-label">Bathrooms</label>
                  <input type="number" step="0.25" class="form-control" id="bathrooms" name="bathrooms" placeholder="e.g. 2.5" required />
                </div>
                <div class="col-md-3 form-group-wrapper" style="animation-delay: 0.3s">
                  <label for="floors" class="form-label">Floors</label>
                  <input type="number" step="0.5" class="form-control" id="floors" name="floors" placeholder="e.g. 2" required />
                </div>
                <div class="col-md-3 form-group-wrapper" style="animation-delay: 0.4s">
                  <label for="condition" class="form-label">Condition (1-5)</label>
                  <input type="number" step="0.5" class="form-control" id="condition" name="condition" min="1" max="5" placeholder="e.g. 3" required />
                </div>
              </div>

              <!-- Area Section -->
              <h3 class="section-title"><i class="bi bi-rulers"></i> Area Specifications</h3>
              <div class="row g-4 mb-4">
                <div class="col-md-6 form-group-wrapper" style="animation-delay: 0.1s">
                  <label for="sqft_living" class="form-label">Living Area (sqft)</label>
                  <input type="number" step="any" class="form-control" id="sqft_living" name="sqft_living" placeholder="e.g. 2500" required />
                </div>
                <div class="col-md-6 form-group-wrapper" style="animation-delay: 0.2s">
                  <label for="sqft_lot" class="form-label">Lot Area (sqft)</label>
                  <input type="number" step="any" class="form-control" id="sqft_lot" name="sqft_lot" placeholder="e.g. 5000" required />
                </div>
                <div class="col-md-6 form-group-wrapper" style="animation-delay: 0.3s">
                  <label for="sqft_above" class="form-label">Above Ground (sqft)</label>
                  <input type="number" step="any" class="form-control" id="sqft_above" name="sqft_above" placeholder="e.g. 1500" required />
                </div>
                <div class="col-md-6 form-group-wrapper" style="animation-delay: 0.4s">
                  <label for="sqft_basement" class="form-label">Basement Area (sqft)</label>
                  <input type="number" step="any" class="form-control" id="sqft_basement" name="sqft_basement" placeholder="e.g. 1000" required />
                </div>
              </div>

              <!-- Features & History -->
              <h3 class="section-title"><i class="bi bi-stars"></i> Features & History</h3>
              <div class="row g-4 mb-4">
                <div class="col-md-3 form-group-wrapper" style="animation-delay: 0.1s">
                  <label for="waterfront" class="form-label">Waterfront</label>
                  <select class="form-control" id="waterfront" name="waterfront" required>
                    <option value="0">No (0)</option>
                    <option value="1">Yes (1)</option>
                  </select>
                </div>
                <div class="col-md-3 form-group-wrapper" style="animation-delay: 0.2s">
                  <label for="view" class="form-label">View (0-4)</label>
                  <input type="number" class="form-control" id="view" name="view" min="0" max="4" placeholder="e.g. 0" required />
                </div>
                <div class="col-md-3 form-group-wrapper" style="animation-delay: 0.3s">
                  <label for="yr_built" class="form-label">Year Built</label>
                  <input type="number" class="form-control" id="yr_built" name="yr_built" placeholder="e.g. 1990" required />
                </div>
                <div class="col-md-3 form-group-wrapper" style="animation-delay: 0.4s">
                  <label for="yr_renovated" class="form-label">Year Renovated</label>
                  <input type="number" class="form-control" id="yr_renovated" name="yr_renovated" placeholder="0 if none" required />
                </div>
              </div>

              <!-- Location Section -->
              <h3 class="section-title"><i class="bi bi-geo-alt"></i> Location</h3>
              <div class="row g-4 mb-4">
                <div class="col-md-4 form-group-wrapper" style="animation-delay: 0.1s">
                  <label for="city" class="form-label">City</label>
                  <select class="form-control custom-select" id="city" name="city" required>
                    <option value="" disabled selected>Select a city</option>
                    {% for city in cities %}
                    <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-md-4 form-group-wrapper" style="animation-delay: 0.2s">
                  <label for="street" class="form-label">Street</label>
                  <select class="form-control custom-select" id="street" name="street" required>
                    <option value="" disabled selected>Select a street</option>
                    {% for street in streets %}
                    <option value="{{ street }}">{{ street }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-md-4 form-group-wrapper" style="animation-delay: 0.3s">
                  <label for="state_zip" class="form-label">State Zipcode</label>
                  <select class="form-control custom-select" id="state_zip" name="state_zip" required>
                    <option value="" disabled selected>Select Zipcode</option>
                    {% for state_zip in state_zips %}
                    <option value="{{ state_zip }}">{{ state_zip }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>

              <div class="text-center mt-5">
                <button type="submit" class="btn btn-primary btn-lg w-100">
                  <i class="bi bi-magic me-2"></i>Predict Price
                </button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Activate Select2 -->
    <script>
      $(document).ready(function () {
        $('.custom-select').select2({
          width: '100%',
          theme: 'default'
        });
        
        $("#city").select2({ placeholder: "Search city", allowClear: true });
        $("#street").select2({ placeholder: "Search street", allowClear: true });
        $("#state_zip").select2({ placeholder: "Search zipcode", allowClear: true });
      });
    </script>
  </body>
</html>
